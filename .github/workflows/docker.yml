# Build realms-devkit Docker image; run tests and cluster generator in container; push to GHCR
name: Docker

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    name: Build and run in container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set image owner to lowercase
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build realms-devkit image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./realms-devkit
          file: ./realms-devkit/Dockerfile
          push: false
          load: true
          tags: realms-devkit:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Ch7 tests inside devkit image
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace \
            realms-devkit:test python -m tests.test_pot_o_ch7 -v

      - name: Run cluster generator in Python container
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" -w /repo python:3.11-slim bash -c "
            python generate_synthetic_pot_o_challenges_ch7_cluster.py \
              --total 128 --workers 2 --worker-id 0 --output-dir /repo/out
            test -f /repo/out/synthetic-pot-o-challenges-ch7-cluster-0000.jsonl
            wc -l /repo/out/synthetic-pot-o-challenges-ch7-cluster-0000.jsonl
          "

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata and push
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./realms-devkit
          file: ./realms-devkit/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER_LC }}/realms-devkit:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER_LC }}/realms-devkit:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
