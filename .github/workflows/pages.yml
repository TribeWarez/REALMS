# Publish realms-devkit notebooks as static HTML to GitHub Pages
# Free for public repos; gives a browsable https://<org>.github.io/<repo>/ site
name: Pages

on:
  push:
    branches: [main, master]
    paths:
      - "realms-devkit/notebooks/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Convert notebooks to HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install nbconvert
        run: pip install --no-cache-dir "nbconvert>=7.16,<8" "nbformat>=5.10,<6"

      - name: Convert notebooks to HTML
        run: |
          mkdir -p _site
          failed=0
          for nb in realms-devkit/notebooks/*.ipynb; do
            name=$(basename "$nb" .ipynb)
            echo "Converting $name..."
            if ! jupyter nbconvert --to html "$nb" --output-dir _site/; then
              echo "WARNING: failed to convert $name" >&2
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "ERROR: $failed notebook(s) failed to convert" >&2
            exit 1
          fi

      - name: Generate index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>REALMS devkit — Part IV notebooks</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
              h1 { font-size: 1.5rem; }
              ul { line-height: 2; }
              a { color: #0366d6; }
              footer { margin-top: 40px; font-size: 0.85rem; color: #666; }
            </style>
          </head>
          <body>
            <h1>REALMS devkit — Part IV notebooks</h1>
            <p>Interactive reference for <em>Part IV — Information-Theoretic Foundation of Spacetime</em>
               (§3 network structure, §4 tensor entropy S = |γ| log d, §7 information Lagrangian).</p>
            <ul>
              <li><a href="01_planck_and_bounds.html">01 — Planck units &amp; entropy bounds</a></li>
              <li><a href="02_tensor_network_entropy.html">02 — Tensor network entropy (S = |γ| log d)</a></li>
              <li><a href="03_entanglement_geometry.html">03 — Entanglement geometry</a></li>
              <li><a href="04_information_lagrangian.html">04 — Information Lagrangian</a></li>
              <li><a href="05_qiskit_circuits_entropy.html">05 — Qiskit circuits &amp; entropy</a></li>
            </ul>
            <footer>
              <a href="https://github.com/TribeWarez/pot-o-ch7-cluster">GitHub</a> ·
              <a href="https://huggingface.co/Tribewarez">Hugging Face</a>
            </footer>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
