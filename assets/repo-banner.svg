<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a6cf7"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6cf7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Glow behind text -->
  <ellipse cx="640" cy="320" rx="500" ry="250" fill="url(#glow)"/>

  <!-- Title -->
  <text x="640" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#ffffff">
    REALMS
  </text>

  <!-- Subtitle -->
  <text x="640" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#b0b0d0">
    Planck · Observer · Information
  </text>

  <!-- Description -->
  <text x="640" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#8080a0">
    Realm-based Emergent Architecture for Localized Manifestation Spaces
  </text>

  <!-- Decorative line -->
  <line x1="440" y1="410" x2="840" y2="410" stroke="url(#accent)" stroke-width="2"/>

  <!-- Bottom text -->
  <text x="640" y="470" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#606080">
    Theoretical Physics Manuscript · CC BY 4.0 · TribeWarez
  </text>
</svg>
